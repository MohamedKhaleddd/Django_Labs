{%extends 'base.html'%}
{%block title %}
Book_List
{%endblock%}
 {%block content%}
<table border="1px solid" width="100%" height="100%">
    <tr>
        <th>Code</th>
        <th>Name</th>
        <th>Description</th>
        <th>Tools</th>
        <th>Price</th>
        <th>Image</th>

    </tr>

        <tr>
            <td>{{course.code}}</td>
            <td>{{course.name}}</td>
            <td>{{course.description}}</td>
            <td>{{course.tool}}</td>
            <td>{{course.price}}</td>
            <td>
                <img src="{{course.image}}" width="30%" height="30%" alt="{{course.name}}">
            </td>


        </tr>

</table>




{%endblock%}
